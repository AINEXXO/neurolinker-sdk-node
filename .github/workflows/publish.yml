name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to release (empty = use package.json)"
        required: false
        default: ""

jobs:
  release:
    runs-on: ubuntu-latest
    environment: prod

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure we are on main
        run: |
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$CURRENT_BRANCH" != "main" ]; then
            echo "This workflow must be run on main (current: $CURRENT_BRANCH)."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env from GitHub secrets and variables
        run: |
          cat <<EOF > .env
          NEUROLINKER_BASE_URL=${{ vars.NEUROLINKER_BASE_URL }}
          NEUROLINKER_API_KEY=${{ secrets.NEUROLINKER_API_KEY }}
          NEUROLINKER_TEST_PDF_URL=${{ vars.NEUROLINKER_TEST_PDF_URL }}
          EOF

      #TODO: remove tests to speed-up just for debug.
      # - name: Run tests
      #   run: npx vitest run --testTimeout $(( ${{ vars.NEUROLINKER_E2E_TIMEOUT_S }} * 1000 ))

      - name: Determine version
        id: get_version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

          INPUT_VERSION="${{ github.event.inputs.release_version }}"
          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: input version ($INPUT_VERSION) differs from package.json ($PKG_VERSION)"
            exit 1
          fi

          echo "release_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        env:
          VERSION: ${{ steps.get_version.outputs.release_version }}
        run: |
          TAG="v$VERSION"

          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "ERROR: tag $TAG already exists on origin."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"

      - name: Build
        run: npm run build

      - name: Configure npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc

      - name: Verify npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Debug npm auth details
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config get registry
          npm token list || true

      - name: Publish dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --dry-run

      - name: Debug 
        run: npm view neurolinker-sdk --json

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public