name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to release (empty = use package.json)"
        required: false
        default: ""

jobs:
  release:
    runs-on: ubuntu-latest
    environment: prod

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure we are on main
        run: |
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$CURRENT_BRANCH" != "main" ]; then
            echo "This workflow must be run on main (current: $CURRENT_BRANCH)."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Show npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci

      - name: Create .env from GitHub secrets and variables
        run: |
          cat <<EOF > .env
          NEUROLINKER_BASE_URL=${{ vars.NEUROLINKER_BASE_URL }}
          NEUROLINKER_API_KEY=${{ secrets.NEUROLINKER_API_KEY }}
          NEUROLINKER_TEST_PDF_URL=${{ vars.NEUROLINKER_TEST_PDF_URL }}
          EOF

      - name: Run tests
        run: npx vitest run --testTimeout $(( ${{ vars.NEUROLINKER_E2E_TIMEOUT_S }} * 1000 ))

      - name: Determine version
        id: get_version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

          INPUT_VERSION="${{ github.event.inputs.release_version }}"
          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: input version ($INPUT_VERSION) differs from package.json ($PKG_VERSION)"
            exit 1
          fi

          echo "release_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Debug npm config paths
        run: |
          echo "NPM_CONFIG_USERCONFIG=${NPM_CONFIG_USERCONFIG}"
          npm config get userconfig
          npm config get registry

      # - name: Sanitize npm user config (remove legacy auth)
      #   run: |
      #     USERCONFIG="$(npm config get userconfig)"
      #     echo "Using userconfig: $USERCONFIG"
      #     if [ -f "$USERCONFIG" ]; then
      #       # Remove legacy/undesired settings that can break OIDC flows or force token auth
      #       sed -i '/always-auth/d' "$USERCONFIG"
      #       sed -i '/_authToken/d' "$USERCONFIG"
      #       sed -i '/_auth=/d' "$USERCONFIG"
      #       sed -i '/username=/d' "$USERCONFIG"
      #       sed -i '/password=/d' "$USERCONFIG"
      #     fi
      #     # Show sanitized config keys (no secrets)
      #     npm config list -l | sed -E 's/(authToken=).+/\1[REDACTED]/g'

      - name: Publish to npm (Trusted Publishing)
        run: npm publish --access public

      - name: Ensure tag does not already exist
        env:
          VERSION: ${{ steps.get_version.outputs.release_version }}
        run: |
          TAG="v$VERSION"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "ERROR: tag $TAG already exists on origin."
            exit 1
          fi

      - name: Create and push git tag
        env:
          VERSION: ${{ steps.get_version.outputs.release_version }}
        run: |
          TAG="v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"